# ==============================================================
# DeepTutor - Docker Compose Production Configuration (Supabase)
# ==============================================================
# Usage:
#   1. 在 Supabase 创建项目，获取 PostgreSQL 直连 URL
#   2. 在 .env 中设置 DEEPTUTOR_POSTGRES_DSN 为 Supabase 连接串
#   3. 在 .env 中设置 NEXT_PUBLIC_API_BASE=http://你的服务器IP
#   4. 运行: docker compose up -d --build
# ==============================================================

services:
  # ---------- Neo4j (RAG vector + graph store) ----------
  neo4j:
    image: neo4j:5.26
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/deeptutor_neo4j}
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INIT:-512m}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX:-1g}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE_SIZE:-512m}
      NEO4J_server_config_strict__validation_enabled: "false"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
      - ./data/neo4j/plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ---------- FastAPI Backend ----------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      # Persist user data and knowledge bases outside container
      - ./data:/app/data
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/v1/knowledge/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------- Next.js Frontend ----------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        # This URL is baked into the frontend bundle at build time
        # Must be the public URL that browsers use to reach the API
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  # ---------- Nginx Reverse Proxy ----------
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
