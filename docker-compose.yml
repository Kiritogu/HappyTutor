# ==============================================================
# DeepTutor - Docker Compose Production Configuration (Supabase)
# ==============================================================
# Usage:
#   1. 在 Supabase 创建项目，获取 PostgreSQL 直连 URL
#   2. 在 .env 中设置 DEEPTUTOR_POSTGRES_DSN 为 Supabase 连接串
#   3. 在 .env 中设置 NEXT_PUBLIC_API_BASE=http://你的服务器IP
#   4. 运行: docker compose up -d --build
# ==============================================================

services:
  # ---------- FastAPI Backend ----------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      # Persist user data and knowledge bases outside container
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/v1/knowledge/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------- Next.js Frontend ----------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        # This URL is baked into the frontend bundle at build time
        # Must be the public URL that browsers use to reach the API
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  # ---------- Nginx Reverse Proxy ----------
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
